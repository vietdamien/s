name: Secret Scan (trufflehog)

# Renamed from `gitleaks` (the action now requires a paid org license
# per https://github.com/gitleaks/gitleaks-action#-announcement —
# "[screenpipe] is an organization. License key is required.").
# TruffleHog gives us the same intent (find leaked credentials in
# commits) at zero cost and ships its own GitHub Action.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so TruffleHog can scan the diff between
          # base and head (PRs) or the whole repo (push).
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          # On push to main: scan the just-pushed commits (HEAD~1..HEAD).
          # On PR: scan the PR diff (base..head). The action infers
          # both automatically from the GITHUB_EVENT_NAME — no extra
          # config needed.
          path: ./
          # Exit non-zero on findings so the check fails loud, matching
          # the prior gitleaks behavior.
          extra_args: --only-verified --fail
